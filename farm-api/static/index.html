<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFarm — Dashboard</title>
    <meta name="description" content="Dashboard temps réel de la ferme autonome AutoFarm">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="header-logo">🌱</div>
                <h1>Auto<span>Farm</span></h1>
            </div>
            <div class="header-status">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">Connexion…</span>
                <span id="lastUpdate"></span>
            </div>
        </header>

        <!-- Sensor Cards -->
        <section class="sensor-grid" id="sensorGrid">
            <!-- Populated dynamically by dashboard.js -->
        </section>

        <!-- Charts -->
        <section class="charts-section">
            <h2 class="section-title">📈 Historique</h2>
            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-header">
                        <span class="chart-title">Évolution des capteurs</span>
                        <div class="chart-period">
                            <button class="active" data-limit="50">1h</button>
                            <button data-limit="150">6h</button>
                            <button data-limit="500">24h</button>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="historyChart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <!-- Actions History -->
        <section class="actions-section">
            <h2 class="section-title">⚡ Dernières actions</h2>
            <div class="actions-list" id="actionsList">
                <div class="empty-state">Chargement…</div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            AutoFarm Dashboard — Refresh auto toutes les 10s
            · <a href="/docs" target="_blank">API Docs</a>
        </footer>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>

</html>
